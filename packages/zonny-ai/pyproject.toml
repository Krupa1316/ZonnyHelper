[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "zonny-ai"
version = "0.2.0"
description = "Zonny AI — LLM-powered commands for git automation, deploy planning, and codebase intelligence. Extends zonny-core."
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
keywords = ["cli", "git", "ai", "llm", "deploy", "developer-tools"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Version Control :: Git",
    "Topic :: Utilities",
]
dependencies = [
    "zonny-core>=0.2.0",
]

[project.optional-dependencies]
anthropic = ["anthropic>=0.30"]
openai    = ["openai>=1.30"]
gemini    = ["google-genai>=1.0"]
all       = ["zonny-ai[anthropic,openai,gemini]"]
dev = [
    "pytest>=8",
    "pytest-cov",
    "ruff",
    "mypy",
]

[project.scripts]
# zonny-ai adds AI sub-commands by extending the zonny_core app at import time.
# The entry point is still `zonny` from zonny-core; installing zonny-ai auto-
# registers additional commands via a post-install entry point hook.
zonny-ai-attach = "zonny_ai.cli_extension:attach"

[project.entry-points."zonny_core.extensions"]
ai = "zonny_ai.cli_extension:attach"

[project.urls]
Homepage   = "https://github.com/Saridena/zonny"
Repository = "https://github.com/Saridena/zonny"
Issues     = "https://github.com/Saridena/zonny/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/zonny_ai"]
